body:
  text: 爾時世尊欲般涅槃倚臥雙林告諸大衆吾今背痛欲般涅槃不見阿難及吾迦葉來時語道吾與汝不相見也即使優波離往詣忉利天宮告吾母知舉身疼痛不可思議願母早來禮敬三寶爾時佛母於其中夜作六種惡夢一者夢見須彌山崩二者夢見四海枯竭三者夢見五月下霜四者夢見寶幢摧折幡花崩倒五者夢見四火來燒我身六者夢見兩乳無故自然流出爾時佛母說夢未了正見優波離從空而來爾時佛母即問聖人從何而來太劇顏容憔悴面色無光狀似怯人爾時優波離哽咽聲嘶良久不語告言佛母佛母我如來三界大師昨夜子時捨大法身入般涅槃故使我來告諸眷屬爾時佛母聞是語已捶胸自撲狀似五須彌山崩遍體血現如波羅奢花悶絶劈地時有二天女將水灑之良久乃蘇爾時佛母將諸天衆恭敬圍繞從忉利天宮下至娑羅雙樹間正見如來殯斂已訖唯有僧伽離衣疊著棺邊瓶盂錫杖掛其樹上有二獅子自縊而死十大弟子以手拍頭向天號哭爾時佛母手攜此物而作是言此是我子住世之日將此瓶盂錫杖處處化導衆生此物今無主也爾時佛母繞棺三匝却住一面捫淚而言告言悉達悉達汝是我子我是汝母汝今入般涅槃云何不留半偈之法是為平等爾時如來聞母喚聲金棺自開却坐千葉蓮華臺上為母說偈世間苦空諸行無常是生滅法生滅滅已寂滅為樂爾時佛母聞是妙法心生歡喜還歸本天未至天所住立虛空心生慈悲嗚呼大哭天地震動淚下如雨雲中百鳥皆作哭聲一切恩愛會有離別一切江河會有枯竭一切叢林會有摧折何期如來三界大師入般涅槃録文完
